<script type="text/babel">
const{useState,useRef,useEffect,useCallback}=React;

function normSQL(s){return s.replace(/--[^\n]*/g,"").replace(/\/\*[\s\S]*?\*\//g,"").replace(/\s+/g," ").replace(/\s*([=<>(),;])\s*/g,"$1").trim().toLowerCase()}
function sqlMatch(a,sol){
  const na=normSQL(a),ns=normSQL(sol);
  if(na===ns)return true;
  const tok=s=>s.match(/[a-z0-9_.%*]+|'[^']*'/g)||[];
  const st=tok(ns),as=new Set(tok(na));
  return st.filter(t=>t.length>1&&!as.has(t)).length<=Math.ceil(st.length*.08);
}

function Confetti({trigger}){
  const[pts,setPts]=useState([]);
  useEffect(()=>{
    if(!trigger)return;
    const cols=["#00e5ff","#a8ff3e","#ffd166","#c084fc","#ff6b35","#fff"];
    setPts(Array.from({length:26},(_,i)=>({id:Date.now()+i,x:35+Math.random()*30,vx:(Math.random()-.5)*160,vy:-(80+Math.random()*110),color:cols[i%cols.length],size:5+Math.random()*5,round:Math.random()>.5,rot:Math.random()*360})));
    const t=setTimeout(()=>setPts([]),1300);return()=>clearTimeout(t);
  },[trigger]);
  if(!pts.length)return null;
  return <div style={{position:"absolute",inset:0,pointerEvents:"none",overflow:"hidden",zIndex:20}}>{pts.map(p=><div key={p.id} style={{position:"absolute",left:`${p.x}%`,bottom:"60%",width:p.size,height:p.size,background:p.color,borderRadius:p.round?"50%":"2px",animation:"cflySQL 1.15s ease-out forwards","--vx":`${p.vx}px`,"--vy":`${p.vy}px`,"--rot":`${p.rot}deg`}}/>)}</div>;
}

function Toast({msg,type,visible}){
  return <div style={{position:"fixed",bottom:28,left:"50%",transform:`translateX(-50%) translateY(${visible?0:14}px)`,opacity:visible?1:0,transition:"all .3s",pointerEvents:"none",zIndex:9999,fontFamily:"monospace",fontSize:13,letterSpacing:1,padding:"12px 24px",whiteSpace:"nowrap",backdropFilter:"blur(12px)",background:type==="success"?"rgba(8,18,10,.97)":"rgba(18,8,8,.97)",border:`1px solid ${type==="success"?"rgba(168,255,62,.6)":"rgba(255,107,53,.6)"}`,color:type==="success"?"#a8ff3e":"#ff6b35"}}>{msg}</div>;
}

function Exercise({id,num,question,difficulty,solution,onSolve,accentRgb}){
  const[val,setVal]=useState("");
  const[status,setStatus]=useState("idle");
  const[attempts,setAttempts]=useState(0);
  const[fb,setFb]=useState({title:"",sub:""});
  const[solOpen,setSolOpen]=useState(false);
  const[cfKey,setCfKey]=useState(0);
  const[shake,setShake]=useState(false);
  const ta=useRef(null);
  const solved=status==="success";
  const hints=["Vérifiez l'ordre des clauses (SELECT→FROM→WHERE→GROUP BY→ORDER BY).","Attention aux noms de colonnes, alias et guillemets autour des chaînes.","Des colonnes ou conditions spécifiques sont peut-être manquantes.","Pensez aux jointures, fonctions d'agrégation ou sous-requêtes.","Vérifiez chaque mot-clé et les valeurs littérales."];
  const dc={easy:"#a8ff3e",med:"#ffd166",hard:"#ff6b35"}[difficulty]||"#a8ff3e";
  const dl={easy:"Facile",med:"Moyen",hard:"Difficile"}[difficulty]||"";
  const check=()=>{
    if(solved||!val.trim()){if(!val.trim()&&ta.current)ta.current.focus();return;}
    const n=attempts+1;setAttempts(n);
    if(sqlMatch(val,solution)){setStatus("success");setFb({title:"Bonne réponse !",sub:n===1?"Parfait du premier coup ! 🏆":`Réussi en ${n} tentative${n>1?"s":""}.`});setSolOpen(true);setCfKey(k=>k+1);onSolve&&onSolve(id);}
    else{setStatus("fail");setFb({title:"Pas tout à fait…",sub:hints[Math.min(n-1,hints.length-1)]});setShake(true);setTimeout(()=>setShake(false),500);}
  };
  const reset=()=>{if(solved)return;setVal("");setStatus("idle");setFb({title:"",sub:""});if(ta.current)ta.current.focus();};
  return(
    <div style={{background:"#0d1117",border:`1px solid ${solved?"rgba(168,255,62,.4)":status==="fail"?"rgba(255,107,53,.25)":"#1e2230"}`,marginBottom:18,position:"relative",overflow:"hidden",transition:"border-color .3s",animation:shake?"shakeSQL .4s ease":"none"}}>
      <Confetti trigger={cfKey}/>
      <div style={{display:"flex",alignItems:"flex-start",gap:12,padding:"12px 16px",borderBottom:"1px solid #1e2230"}}>
        <span style={{fontFamily:"monospace",fontSize:10,color:"#5a6070",letterSpacing:1,paddingTop:2,flexShrink:0}}>{num}</span>
        <span style={{fontFamily:"monospace",fontSize:13,lineHeight:1.6,flex:1,color:"#e8eaf0"}}>{question}</span>
        <span style={{fontFamily:"monospace",fontSize:10,letterSpacing:1,padding:"2px 8px",border:`1px solid ${dc}`,color:dc,background:`${dc}18`,flexShrink:0}}>{dl}</span>
      </div>
      <div style={{padding:"12px 16px",borderBottom:"1px solid #1e2230"}}>
        <div style={{fontFamily:"monospace",fontSize:10,letterSpacing:2,color:"#5a6070",textTransform:"uppercase",marginBottom:7}}>Votre requête SQL</div>
        <textarea ref={ta} value={val} onChange={e=>{if(!solved)setVal(e.target.value)}} onKeyDown={e=>{if(e.ctrlKey&&e.key==="Enter")check()}} placeholder="Écrivez votre requête SQL ici…  (Ctrl+Entrée pour vérifier)" rows={3} style={{width:"100%",background:"#070a0f",color:"#e8eaf0",border:`1px solid ${solved?"rgba(168,255,62,.4)":status==="fail"?"rgba(255,107,53,.4)":"#2a3040"}`,fontFamily:"monospace",fontSize:12.5,lineHeight:1.7,padding:"10px 13px",resize:"vertical",outline:"none",transition:"border-color .25s",boxShadow:solved?"0 0 0 2px rgba(168,255,62,.06)":status==="fail"?"0 0 0 2px rgba(255,107,53,.06)":"none"}}/>
        <div style={{display:"flex",alignItems:"center",gap:8,marginTop:9,flexWrap:"wrap"}}>
          <button onClick={check} disabled={solved} style={{fontFamily:"monospace",fontSize:10,letterSpacing:1.5,padding:"8px 18px",border:`1px solid ${solved?"rgba(168,255,62,.3)":`rgba(${accentRgb},.5)`}`,color:solved?"#a8ff3e":`rgb(${accentRgb})`,background:solved?"rgba(168,255,62,.08)":`rgba(${accentRgb},.07)`,cursor:solved?"default":"pointer",textTransform:"uppercase",transition:"all .2s"}}>{solved?"✓ Résolu":"▶ Vérifier"}</button>
          {!solved&&<button onClick={reset} style={{fontFamily:"monospace",fontSize:10,letterSpacing:1.5,padding:"8px 16px",border:"1px solid #1e2230",color:"#5a6070",background:"transparent",cursor:"pointer",textTransform:"uppercase"}}>↺ Réinitialiser</button>}
          <span style={{fontFamily:"monospace",fontSize:10,color:"#5a6070",marginLeft:"auto",letterSpacing:1}}>{attempts} tentative{attempts!==1?"s":""}</span>
        </div>
      </div>
      {fb.title&&<div style={{display:"flex",alignItems:"flex-start",gap:10,padding:"11px 16px",background:solved?"rgba(168,255,62,.07)":"rgba(255,107,53,.07)",borderBottom:`1px solid ${solved?"rgba(168,255,62,.2)":"rgba(255,107,53,.2)"}`,animation:"fadeInSQL .25s ease"}}>
        <span style={{fontSize:16,flexShrink:0,lineHeight:1.3}}>{solved?"🎉":"✗"}</span>
        <div><div style={{fontFamily:"monospace",fontSize:12,fontWeight:600,color:solved?"#a8ff3e":"#ff6b35",marginBottom:3}}>{fb.title}</div><div style={{fontFamily:"monospace",fontSize:11,color:"#5a6070",lineHeight:1.5}}>{fb.sub}</div></div>
      </div>}
      {!solOpen&&<div style={{padding:"10px 16px",fontFamily:"monospace",fontSize:11,color:"#2a3040",display:"flex",alignItems:"center",gap:8}}>🔒 La solution se débloque après une réponse correcte</div>}
      {solOpen&&<div style={{borderTop:"1px solid rgba(168,255,62,.2)",background:"rgba(168,255,62,.03)",animation:"fadeInSQL .4s ease"}}><div style={{padding:"12px 16px"}}><div style={{fontFamily:"monospace",fontSize:10,letterSpacing:2,color:"#a8ff3e",textTransform:"uppercase",marginBottom:9}}>✓ Solution</div><pre style={{fontFamily:"monospace",fontSize:12,lineHeight:1.8,color:"#e8eaf0",overflowX:"auto",margin:0,whiteSpace:"pre-wrap"}}>{solution}</pre></div></div>}
    </div>
  );
}

function ScoreBar({solved,total}){
  const pct=total>0?(solved/total)*100:0;
  return <div style={{marginBottom:18,padding:"12px 16px",background:"rgba(255,255,255,.02)",border:"1px solid #1e2230",display:"flex",alignItems:"center",gap:14}}>
    <span style={{fontFamily:"monospace",fontSize:10,color:"#5a6070",letterSpacing:2,textTransform:"uppercase"}}>Score</span>
    <span style={{fontFamily:"monospace",fontSize:22,fontWeight:700,color:"#a8ff3e"}}>{solved}</span>
    <span style={{fontFamily:"monospace",fontSize:12,color:"#5a6070"}}>/ {total}</span>
    <div style={{flex:1,height:4,background:"#1e2230",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:"#a8ff3e",borderRadius:2,transition:"width .5s cubic-bezier(.16,1,.3,1)"}}/></div>
    <span style={{fontFamily:"monospace",fontSize:14,letterSpacing:2}}>{Array.from({length:total},(_,i)=>i<solved?"★":"☆").join("")}</span>
  </div>;
}

function ExSection({exercises,accentRgb}){
  const[solvedSet,setSolvedSet]=useState(new Set());
  const[toast,setToast]=useState({visible:false,msg:"",type:"success"});
  const timer=useRef(null);
  const showToast=useCallback((msg,type)=>{clearTimeout(timer.current);setToast({visible:true,msg,type});timer.current=setTimeout(()=>setToast(p=>({...p,visible:false})),2800);},[]);
  const handleSolve=useCallback(id=>{setSolvedSet(prev=>{if(prev.has(id))return prev;const n=new Set(prev);n.add(id);showToast("✓ Bonne réponse !","success");return n;});},[showToast]);
  return <><Toast msg={toast.msg} type={toast.type} visible={toast.visible}/><ScoreBar solved={solvedSet.size} total={exercises.length}/>{exercises.map(ex=><Exercise key={ex.id} {...ex} accentRgb={accentRgb} onSolve={handleSolve}/>)}</>;
}

function Modal({open,onClose,color,keyword,badge,tabs,children}){
  const ch={cyan:"#00e5ff",orange:"#ff6b35",green:"#a8ff3e",purple:"#c084fc",yellow:"#ffd166"};
  const c=ch[color]||"#00e5ff";
  const[tab,setTab]=useState(0);
  useEffect(()=>{if(!open)setTab(0);},[open]);
  useEffect(()=>{const h=e=>{if(e.key==="Escape")onClose();};if(open)document.addEventListener("keydown",h);return()=>document.removeEventListener("keydown",h);},[open,onClose]);
  if(!open)return null;
  return <div onClick={e=>{if(e.target===e.currentTarget)onClose();}} style={{position:"fixed",inset:0,background:"rgba(5,6,10,.93)",backdropFilter:"blur(8px)",zIndex:1000,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"40px 20px",overflowY:"auto",animation:"fadeInSQL .25s ease"}}>
    <div style={{background:"#111318",border:"1px solid #1e2230",width:"100%",maxWidth:860,margin:"auto",animation:"slideUpSQL .35s cubic-bezier(.16,1,.3,1)"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"22px 28px",borderBottom:"1px solid #1e2230",position:"sticky",top:0,background:"#111318",zIndex:10}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <span style={{fontFamily:"monospace",fontSize:18,fontWeight:500,letterSpacing:2,color:c}}>{keyword}</span>
          <span style={{fontFamily:"monospace",fontSize:10,letterSpacing:2,padding:"3px 10px",border:`1px solid ${c}`,color:c,opacity:.5,textTransform:"uppercase"}}>{badge}</span>
        </div>
        <button onClick={onClose} style={{width:34,height:34,background:"transparent",border:"1px solid #1e2230",color:"#5a6070",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
      </div>
      <div style={{display:"flex",borderBottom:"1px solid #1e2230"}}>
        {tabs.map((t,i)=><button key={i} onClick={()=>setTab(i)} style={{flex:1,padding:12,fontFamily:"monospace",fontSize:11,letterSpacing:1,textTransform:"uppercase",background:tab===i?"rgba(255,255,255,.03)":"transparent",border:"none",borderRight:i<tabs.length-1?"1px solid #1e2230":"none",borderBottom:tab===i?`2px solid ${c}`:"2px solid transparent",color:tab===i?"#e8eaf0":"#5a6070",cursor:"pointer",transition:"all .2s"}}>{t}</button>)}
      </div>
      <div style={{padding:"26px 28px"}}>{children[tab]}</div>
    </div>
  </div>;
}

const Kw=({children})=><span style={{color:"#00e5ff",fontWeight:500}}>{children}</span>;
const Kw2=({children})=><span style={{color:"#ff6b35",fontWeight:500}}>{children}</span>;
const Kw3=({children})=><span style={{color:"#a8ff3e",fontWeight:500}}>{children}</span>;
const Kw4=({children})=><span style={{color:"#c084fc",fontWeight:500}}>{children}</span>;
const Str=({children})=><span style={{color:"#f9c74f"}}>{children}</span>;
const Num=({children})=><span style={{color:"#f77f00"}}>{children}</span>;
const Cm=({children})=><span style={{color:"#5a6070",fontStyle:"italic"}}>{children}</span>;
const CB=({children,accent="#00e5ff",style={}})=><div style={{background:"#0d1117",border:"1px solid #1e2230",borderLeft:`3px solid ${accent}`,padding:"16px 20px",fontFamily:"monospace",fontSize:13,lineHeight:1.8,overflowX:"auto",...style}}>{children}</div>;
const SB=({label,children})=><div style={{background:"#0d1117",border:"1px solid #1e2230",padding:"16px 20px",marginBottom:20}}><div style={{fontFamily:"monospace",fontSize:10,letterSpacing:2,color:"#5a6070",textTransform:"uppercase",marginBottom:8}}>{label}</div><div style={{fontFamily:"monospace",fontSize:13,lineHeight:1.8}}>{children}</div></div>;
const ET=({children})=><div style={{fontFamily:"monospace",fontSize:10,letterSpacing:2,color:"#5a6070",textTransform:"uppercase",marginBottom:10,marginTop:16}}>{children}</div>;
const EI=({desc,children})=><div style={{background:"#0d1117",border:"1px solid #1e2230",borderLeft:"3px solid currentColor",marginBottom:10}}><div style={{padding:"8px 14px",fontSize:12,color:"#5a6070",fontFamily:"monospace",borderBottom:"1px solid #1e2230",background:"rgba(255,255,255,.02)"}}>{desc}</div><div style={{padding:"12px 14px",fontFamily:"monospace",fontSize:13,lineHeight:1.8,overflowX:"auto"}}>{children}</div></div>;
const Tips=({tips})=><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:18}}>{tips.map((t,i)=><div key={i} style={{background:"rgba(255,255,255,.02)",border:"1px solid #1e2230",padding:"13px 15px"}}><div style={{fontSize:14,marginBottom:5}}>{t.icon}</div><div style={{fontFamily:"monospace",fontSize:11,color:"#5a6070",lineHeight:1.6}} dangerouslySetInnerHTML={{__html:t.text}}/></div>)}</div>;
const Intro=({color,children})=><div style={{fontSize:14,lineHeight:1.8,color:"#a0a8b8",marginBottom:22,borderLeft:`3px solid ${color}`,paddingLeft:16}}>{children}</div>;

    {id:"u2",num:"EX 02",difficulty:"easy",question:"Appliquer une hausse de prix de 15% à tous les produits dont le stock est inférieur à 20.",solution:"UPDATE produits SET prix = prix * 1.15 WHERE stock < 20"},
    {id:"u3",num:"EX 03",difficulty:"hard",question:"Suspendre toutes les commandes des clients inactifs (actif = 0) avec une sous-requête IN.",solution:"UPDATE commandes SET statut = 'suspendue' WHERE client_id IN (SELECT id FROM clients WHERE actif = 0)"},

  ],
  norm:[
    {id:"n1",num:"EX 01",difficulty:"med",question:"La table clients(id, nom, tel1, tel2, tel3) viole la 1NF. Restructurer avec une table 'telephones' liée par FK. Écrire les 2 CREATE TABLE.",solution:"CREATE TABLE clients (id INT PRIMARY KEY AUTO_INCREMENT, nom VARCHAR(100) NOT NULL); CREATE TABLE telephones (id INT PRIMARY KEY AUTO_INCREMENT, client_id INT NOT NULL, numero VARCHAR(20) NOT NULL, FOREIGN KEY (client_id) REFERENCES clients(id))"},
    {id:"n2",num:"EX 02",difficulty:"med",question:"La table commandes(id, client_id, client_email, client_ville, montant) viole la 3NF. Écrire le CREATE TABLE commandes normalisé (sans les champs client).",solution:"CREATE TABLE commandes (id INT PRIMARY KEY AUTO_INCREMENT, client_id INT NOT NULL, montant DECIMAL(10,2) NOT NULL, FOREIGN KEY (client_id) REFERENCES clients(id))"},
    {id:"n3",num:"EX 03",difficulty:"hard",question:"Normaliser en 3NF : produits(id, nom, fournisseur_id, fournisseur_nom, fournisseur_pays, categorie_id, categorie_nom). Écrire les 3 CREATE TABLE.",solution:"CREATE TABLE fournisseurs (id INT PRIMARY KEY, nom VARCHAR(100), pays VARCHAR(60)); CREATE TABLE categories (id INT PRIMARY KEY, nom VARCHAR(80)); CREATE TABLE produits (id INT PRIMARY KEY AUTO_INCREMENT, nom VARCHAR(120) NOT NULL, fournisseur_id INT, categorie_id INT, FOREIGN KEY (fournisseur_id) REFERENCES fournisseurs(id), FOREIGN KEY (categorie_id) REFERENCES categories(id))"},
  ],
};

function App(){
  const[modals,setModals]=useState({});
  const open=id=>setModals(m=>({...m,[id]:true}));
  const close=id=>setModals(m=>({...m,[id]:false}));
  const isOpen=id=>!!modals[id];

  const SH=({num,color,title})=><div style={{display:"flex",alignItems:"center",gap:14,marginBottom:26}}><span style={{fontFamily:"monospace",fontSize:11,color:"#5a6070"}}>{num}</span><div style={{width:8,height:8,borderRadius:"50%",background:color,flexShrink:0}}/><h2 style={{fontSize:20,fontWeight:700,letterSpacing:-.5,margin:0}}>{title}</h2><div style={{flex:1,height:1,background:"#1e2230"}}/></div>;

  function Card({color,keyword,desc,onClick}){
    const cm={cyan:"#00e5ff",orange:"#ff6b35",green:"#a8ff3e",purple:"#c084fc",yellow:"#ffd166"};
    const c=cm[color]||"#00e5ff";
    const[hov,setHov]=useState(false);
    return <div onClick={onClick} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} style={{background:"#111318",border:`1px solid ${hov?c:"#1e2230"}`,padding:"20px 20px 16px",cursor:"pointer",transform:hov?"translateY(-3px)":"",boxShadow:hov?`0 8px 30px ${c}20`:"",transition:"all .2s",color:c}}>
      <div style={{fontFamily:"monospace",fontSize:14,fontWeight:500,marginBottom:8,letterSpacing:1}}>{keyword}</div>
      <div style={{fontFamily:"monospace",fontSize:12,color:"#5a6070",lineHeight:1.5}}>{desc}</div>
      <div style={{fontFamily:"monospace",fontSize:10,color:c,opacity:.35,marginTop:12,letterSpacing:1}}>↗ explorer</div>
    </div>;
  }

  return <div style={{background:"#0a0c10",color:"#e8eaf0",fontFamily:"'Syne',sans-serif",minHeight:"100vh",position:"relative"}}>
    <div style={{position:"fixed",inset:0,backgroundImage:"linear-gradient(rgba(0,229,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.03) 1px,transparent 1px)",backgroundSize:"40px 40px",pointerEvents:"none",zIndex:0}}/>
    <div style={{maxWidth:1080,margin:"0 auto",padding:"56px 24px",position:"relative",zIndex:1}}>

      <header style={{textAlign:"center",marginBottom:72}}>
        <div style={{display:"inline-block",fontFamily:"monospace",fontSize:11,letterSpacing:3,color:"#00e5ff",textTransform:"uppercase",border:"1px solid rgba(0,229,255,.3)",padding:"4px 14px",marginBottom:18,background:"rgba(0,229,255,.05)"}}>Référence Technique</div>
        <h1 style={{fontSize:"clamp(40px,8vw,76px)",fontWeight:800,lineHeight:.95,letterSpacing:-2,marginBottom:14}}>Fonda&shy;men&shy;taux<br/><span style={{color:"#00e5ff"}}>SQL</span></h1>
        <p style={{fontFamily:"monospace",color:"#5a6070",fontSize:13}}>// guide interactif — cliquez pour explorer · exercices avec validation</p>
      </header>

      <section style={{marginBottom:56}}>
        <SH num="01" color="#00e5ff" title="Requêtes de base"/>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:12,marginBottom:16}}>
          <Card color="cyan"   keyword="SELECT"      desc="Lire des données depuis une ou plusieurs tables"  onClick={()=>open("select")}/>
          <Card color="orange" keyword="INSERT INTO" desc="Ajouter de nouvelles lignes dans une table"        onClick={()=>open("insert")}/>
          <Card color="green"  keyword="UPDATE"      desc="Modifier des lignes existantes d'une table"        onClick={()=>open("update")}/>
          <Card color="purple" keyword="DELETE"      desc="Supprimer des lignes d'une table"                  onClick={()=>open("delete")}/>
        </div>
        <CB accent="#00e5ff"><Kw>SELECT</Kw> nom, salaire <Kw>FROM</Kw> employes <Kw>WHERE</Kw> dept=<Str>'IT'</Str> <Kw>ORDER BY</Kw> salaire <Kw>DESC LIMIT</Kw> <Num>10</Num>;<br/><Kw>INSERT INTO</Kw> employes (nom,dept,sal) <Kw>VALUES</Kw> (<Str>'Alice'</Str>,<Str>'IT'</Str>,<Num>52000</Num>);<br/><Kw>UPDATE</Kw> employes <Kw>SET</Kw> sal=sal*<Num>1.1</Num> <Kw>WHERE</Kw> anciennete&gt;<Num>5</Num>;<br/><Kw>DELETE FROM</Kw> employes <Kw>WHERE</Kw> id=<Num>42</Num>;</CB>
      </section>

      <section style={{marginBottom:56}}>
        <SH num="02" color="#ff6b35" title="Jointures"/>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:16}}>
          {[{c:"#00e5ff",l:"INNER JOIN",d:"Lignes correspondantes dans les 2 tables",f:[.5,.25]},{c:"#ff6b35",l:"LEFT JOIN",d:"Toutes les lignes gauche + correspondances droite",f:[.5,.15]},{c:"#a8ff3e",l:"RIGHT JOIN",d:"Toutes les lignes droite + correspondances gauche",f:[.15,.5]}].map(j=>{
            const[hov,setHov]=useState(false);
            return <div key={j.l} onClick={()=>open("joins")} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} style={{background:"#111318",border:`1px solid ${hov?j.c:"#1e2230"}`,padding:18,textAlign:"center",cursor:"pointer",transition:"all .2s",transform:hov?"translateY(-3px)":""}}>
              <div style={{height:60,position:"relative",display:"flex",justifyContent:"center",alignItems:"center",marginBottom:10}}>
                <div style={{width:44,height:44,borderRadius:"50%",position:"absolute",left:"22%",background:`${j.c}${Math.round(j.f[0]*255).toString(16).padStart(2,"0")}`,border:`2px solid ${j.c}`}}/>
                <div style={{width:44,height:44,borderRadius:"50%",position:"absolute",left:"40%",background:`${j.c}${Math.round(j.f[1]*255).toString(16).padStart(2,"0")}`,border:`2px solid ${j.c}`}}/>
              </div>
              <div style={{fontFamily:"monospace",fontSize:11,fontWeight:500,letterSpacing:1,color:j.c,marginBottom:5}}>{j.l}</div>
              <div style={{fontFamily:"monospace",fontSize:11,color:"#5a6070"}}>{j.d}</div>
              <div style={{fontFamily:"monospace",fontSize:10,color:j.c,opacity:.35,marginTop:8}}>↗ explorer</div>
            </div>;
          })}
        </div>
        <CB accent="#ff6b35"><Kw>SELECT</Kw> c.nom, cmd.montant <Kw>FROM</Kw> clients c <Kw2>INNER JOIN</Kw2> commandes cmd <Kw>ON</Kw> c.id=cmd.client_id;<br/><Kw>SELECT</Kw> c.nom, <Kw3>COUNT</Kw3>(cmd.id) <Kw>FROM</Kw> clients c <Kw2>LEFT JOIN</Kw2> commandes cmd <Kw>ON</Kw> c.id=cmd.client_id <Kw>GROUP BY</Kw> c.id;</CB>
      </section>

      <section style={{marginBottom:56}}>
        <SH num="03" color="#a8ff3e" title="Fonctions d'agrégation"/>
        <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10,marginBottom:16}}>
          {[["COUNT()","nombre"],["SUM()","somme"],["AVG()","moyenne"],["MIN()","minimum"],["MAX()","maximum"]].map(([fn,sub])=>{
            const[hov,setHov]=useState(false);
            return <div key={fn} onClick={()=>open("agg")} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} style={{background:hov?"rgba(168,255,62,.05)":"#111318",border:`1px solid ${hov?"#a8ff3e":"#1e2230"}`,padding:"14px 10px",textAlign:"center",cursor:"pointer",transition:"all .2s",transform:hov?"translateY(-3px)":""}}>
              <div style={{fontFamily:"monospace",fontSize:14,color:"#a8ff3e",fontWeight:500,marginBottom:4}}>{fn}</div>
              <div style={{fontFamily:"monospace",fontSize:11,color:"#5a6070"}}>{sub}</div>
              <div style={{fontFamily:"monospace",fontSize:10,color:"#a8ff3e",opacity:.35,marginTop:6}}>↗</div>
            </div>;
          })}
        </div>
        <CB accent="#a8ff3e"><Kw>SELECT</Kw> dept, <Kw3>COUNT</Kw3>(*) nb, <Kw3>AVG</Kw3>(sal) moy, <Kw3>MIN</Kw3>(sal), <Kw3>MAX</Kw3>(sal)<br/><Kw>FROM</Kw> employes <Kw>GROUP BY</Kw> dept <Kw>HAVING</Kw> <Kw3>COUNT</Kw3>(*) &gt;= <Num>5</Num> <Kw>ORDER BY</Kw> nb <Kw>DESC</Kw>;</CB>
      </section>

      <section style={{marginBottom:56}}>
        <SH num="04" color="#ff6b35" title="Contraintes et clés"/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
          {[{tag:"PK",name:"PRIMARY KEY",desc:"Identifiant unique. Jamais NULL.",c:"#ff6b35"},{tag:"FK",name:"FOREIGN KEY",desc:"Référence une PK d'une autre table.",c:"#c084fc"},{tag:"UQ",name:"UNIQUE",desc:"Valeurs distinctes. Peut être NULL.",c:"#00e5ff"},{tag:"NN",name:"NOT NULL",desc:"Interdit les valeurs NULL.",c:"#a8ff3e"}].map(ct=>{
            const[hov,setHov]=useState(false);
            return <div key={ct.tag} onClick={()=>open("constraints")} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} style={{background:"#111318",border:`1px solid ${hov?ct.c:"#1e2230"}`,padding:20,display:"flex",gap:14,cursor:"pointer",transition:"all .2s",transform:hov?"translateY(-2px)":""}}>
              <div style={{fontFamily:"monospace",fontSize:11,color:ct.c,background:`${ct.c}18`,border:`1px solid ${ct.c}50`,padding:"4px 8px",flexShrink:0,alignSelf:"flex-start",marginTop:2}}>{ct.tag}</div>
              <div><div style={{fontSize:13,fontWeight:700,marginBottom:5}}>{ct.name}</div><div style={{fontFamily:"monospace",fontSize:11,color:"#5a6070",lineHeight:1.6}}>{ct.desc}</div><div style={{fontFamily:"monospace",fontSize:10,color:ct.c,opacity:.35,marginTop:8,letterSpacing:1}}>↗ explorer</div></div>
            </div>;
          })}
        </div>
        <CB accent="#ff6b35"><Kw>CREATE TABLE</Kw> cmd (id <Kw>INT</Kw> <Kw2>PRIMARY KEY</Kw2> AUTO_INCREMENT, client_id <Kw>INT NOT NULL</Kw>,<br/>&nbsp;&nbsp;ref <Kw>VARCHAR</Kw>(<Num>20</Num>) <Kw2>UNIQUE NOT NULL</Kw2>, <Kw2>FOREIGN KEY</Kw2>(client_id) <Kw>REFERENCES</Kw> clients(id) <Kw>ON DELETE</Kw> CASCADE);</CB>
      </section>

      <section style={{marginBottom:20}}>
        <SH num="05" color="#ffd166" title="Normalisation"/>
        <div style={{display:"flex",marginBottom:16}}>
          {[{nf:"1NF",name:"Première forme",rule:"Valeurs atomiques.\nPas de groupes répétitifs."},{nf:"2NF",name:"Deuxième forme",rule:"1NF + attributs dépendent\nentièrement de la PK."},{nf:"3NF",name:"Troisième forme",rule:"2NF + pas de\ndépendances transitives."}].map((n,i)=>{
            const[hov,setHov]=useState(false);
            return <div key={n.nf} onClick={()=>open("norm")} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} style={{flex:1,background:hov?"rgba(0,229,255,.02)":"#111318",border:"1px solid #1e2230",borderRight:i<2?"none":"1px solid #1e2230",padding:"22px 18px",cursor:"pointer",position:"relative",transition:"background .2s"}}>
              <div style={{fontFamily:"monospace",fontSize:30,fontWeight:700,color:hov?"#ffd166":"#1e2230",marginBottom:6,lineHeight:1,transition:"color .2s"}}>{n.nf}</div>
              <div style={{fontSize:13,fontWeight:700,color:"#ffd166",marginBottom:8,letterSpacing:1}}>{n.name}</div>
              <div style={{fontFamily:"monospace",fontSize:11,color:"#5a6070",lineHeight:1.6,whiteSpace:"pre-line"}}>{n.rule}</div>
              <div style={{fontFamily:"monospace",fontSize:10,color:"#ffd166",opacity:.35,marginTop:10,letterSpacing:1}}>↗ explorer</div>
              {i<2&&<div style={{position:"absolute",right:-11,top:"50%",transform:"translateY(-50%)",width:22,height:22,background:"#0a0c10",border:"1px solid #1e2230",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"#ffd166",zIndex:2}}>→</div>}
            </div>;
          })}
        </div>
        <CB><Cm>-- ✗ Non normalisé : client_nom + produits_liste dans commandes</Cm><br/><Kw>CREATE TABLE</Kw> clients(id, nom, email); <Kw>CREATE TABLE</Kw> produits(id, nom, prix);<br/><Kw>CREATE TABLE</Kw> commandes(id, client_id, date); <Kw>CREATE TABLE</Kw> lignes_cmd(cmd_id, produit_id, qte);</CB>
      </section>
    </div>

    <Modal open={isOpen("select")} onClose={()=>close("select")} color="cyan" keyword="SELECT" badge="Lecture" tabs={["Référence","Exercices"]}>
      <div><Intro color="#00e5ff"><code style={{fontFamily:"monospace"}}>SELECT</code> lit des données depuis une ou plusieurs tables.</Intro><SB label="Syntaxe"><Kw>SELECT</Kw> [DISTINCT] cols <Kw>FROM</Kw> table [<Kw>WHERE</Kw> cond] [<Kw>GROUP BY</Kw> col] [<Kw>HAVING</Kw> cond] [<Kw>ORDER BY</Kw> col] [<Kw>LIMIT</Kw> n <Kw>OFFSET</Kw> m];</SB><ET>// Exemples</ET><EI desc="🔍 Filtre"><Kw>SELECT</Kw> nom, sal <Kw>FROM</Kw> employes <Kw>WHERE</Kw> dept=<Str>'IT'</Str> <Kw>AND</Kw> sal <Kw>BETWEEN</Kw> <Num>30000</Num> <Kw>AND</Kw> <Num>60000</Num>;</EI><EI desc="📊 DISTINCT + pagination"><Kw>SELECT DISTINCT</Kw> cat, prix <Kw>FROM</Kw> produits <Kw>WHERE</Kw> stock&gt;<Num>0</Num> <Kw>ORDER BY</Kw> prix <Kw>DESC LIMIT</Kw> <Num>10</Num> <Kw>OFFSET</Kw> <Num>20</Num>;</EI><EI desc="🔎 IS NULL + IN"><Kw>SELECT</Kw> id, nom <Kw>FROM</Kw> clients <Kw>WHERE</Kw> ville <Kw>IS NULL</Kw> <Kw>OR</Kw> pays <Kw>IN</Kw>(<Str>'FR'</Str>,<Str>'BE'</Str>);</EI><Tips tips={[{icon:"⚡",text:"<strong style='color:#e8eaf0'>Performance</strong> — Évitez SELECT *. Spécifiez les colonnes."},{icon:"🎯",text:"<strong style='color:#e8eaf0'>HAVING vs WHERE</strong> — WHERE filtre avant l'agrégation, HAVING filtre les groupes."},{icon:"🚫",text:"<strong style='color:#e8eaf0'>NULL</strong> — Toujours IS NULL / IS NOT NULL. = NULL ne fonctionne jamais."},{icon:"📄",text:"<strong style='color:#e8eaf0'>Pagination</strong> — OFFSET = (page-1) × LIMIT."}]}/></div>
      <ExSection exercises={EXOS.select} accentRgb="0,229,255"/>
    </Modal>

    <Modal open={isOpen("insert")} onClose={()=>close("insert")} color="orange" keyword="INSERT INTO" badge="Création" tabs={["Référence","Exercices"]}>
      <div><Intro color="#ff6b35"><code style={{fontFamily:"monospace"}}>INSERT INTO</code> ajoute une ou plusieurs lignes.</Intro><SB label="Syntaxe"><Kw>INSERT INTO</Kw> table (col1,col2) <Kw>VALUES</Kw> (v1,v2);<br/><Kw>INSERT INTO</Kw> table (col1,col2) <Kw>VALUES</Kw> (v1,v2),(v3,v4);</SB><ET>// Exemples</ET><EI desc="📦 Multiple"><Kw>INSERT INTO</Kw> produits (nom,cat,prix) <Kw>VALUES</Kw> (<Str>'Laptop'</Str>,<Str>'IT'</Str>,<Num>1299</Num>),(<Str>'Souris'</Str>,<Str>'IT'</Str>,<Num>29.9</Num>);</EI><EI desc="🔄 UPSERT"><Kw>INSERT INTO</Kw> stats (date,val) <Kw>VALUES</Kw>(<Str>'2024-06-01'</Str>,<Num>1500</Num>) <Kw>ON DUPLICATE KEY UPDATE</Kw> val=<Kw>VALUES</Kw>(val);</EI><Tips tips={[{icon:"📋",text:"<strong style='color:#e8eaf0'>Colonnes explicites</strong> — Toujours lister les colonnes."},{icon:"⚡",text:"<strong style='color:#e8eaf0'>Bulk insert</strong> — Multi-valeurs est 5-10× plus rapide."},{icon:"🔑",text:"<strong style='color:#e8eaf0'>AUTO_INCREMENT</strong> — Ne pas spécifier la PK auto-incrémentée."},{icon:"🛡️",text:"<strong style='color:#e8eaf0'>Injection SQL</strong> — Utilisez des requêtes préparées."}]}/></div>
      <ExSection exercises={EXOS.insert} accentRgb="255,107,53"/>
    </Modal>

    <Modal open={isOpen("update")} onClose={()=>close("update")} color="green" keyword="UPDATE" badge="Modification" tabs={["Référence","Exercices"]}>
      <div><Intro color="#a8ff3e"><code style={{fontFamily:"monospace"}}>UPDATE</code> modifie des lignes. <strong>Sans WHERE, toute la table est modifiée.</strong></Intro><SB label="Syntaxe"><Kw>UPDATE</Kw> table <Kw>SET</Kw> col1=val1 <Kw>WHERE</Kw> condition; <Cm>-- ⚠️ NE PAS OUBLIER</Cm></SB><ET>// Exemples</ET><EI desc="💰 Augmentation"><Kw>UPDATE</Kw> employes <Kw>SET</Kw> sal=sal*<Num>1.08</Num> <Kw>WHERE</Kw> dept=<Str>'IT'</Str> <Kw>AND</Kw> anciennete&gt;=<Num>3</Num>;</EI><EI desc="🔄 CASE"><Kw>UPDATE</Kw> produits <Kw>SET</Kw> dispo=<Kw>CASE WHEN</Kw> stock=<Num>0</Num> <Kw>THEN</Kw> <Str>'rupture'</Str> <Kw>ELSE</Kw> <Str>'ok'</Str> <Kw>END</Kw>;</EI><Tips tips={[{icon:"⚠️",text:"<strong style='color:#e8eaf0'>SELECT d'abord</strong> — Testez le WHERE avant de modifier."},{icon:"💾",text:"<strong style='color:#e8eaf0'>Transaction</strong> — BEGIN…COMMIT pour annuler avec ROLLBACK."},{icon:"🔐",text:"<strong style='color:#e8eaf0'>ROW_COUNT()</strong> — Vérifiez le nombre de lignes modifiées."},{icon:"🕒",text:"<strong style='color:#e8eaf0'>Audit</strong> — updated_at ON UPDATE CURRENT_TIMESTAMP."}]}/></div>
      <ExSection exercises={EXOS.update} accentRgb="168,255,62"/>
    </Modal>

    <Modal open={isOpen("delete")} onClose={()=>close("delete")} color="purple" keyword="DELETE" badge="Suppression" tabs={["Référence","Exercices"]}>
      <div><Intro color="#c084fc"><code style={{fontFamily:"monospace"}}>DELETE</code> supprime définitivement. Sans WHERE toute la table est vidée.</Intro><SB label="Syntaxe"><Kw>DELETE FROM</Kw> table <Kw>WHERE</Kw> condition;<br/><Kw4>TRUNCATE TABLE</Kw4> table; <Cm>-- vide tout + reset AUTO_INCREMENT</Cm></SB><ET>// Exemples</ET><EI desc="🧹 Purge logs"><Kw>DELETE FROM</Kw> logs <Kw>WHERE</Kw> created_at &lt; <Kw>DATE_SUB</Kw>(<Kw>NOW</Kw>(),<Kw>INTERVAL</Kw> <Num>90</Num> <Kw>DAY</Kw>);</EI><EI desc="🔁 Sous-requête"><Kw>DELETE FROM</Kw> commandes <Kw>WHERE</Kw> client_id <Kw>NOT IN</Kw>(<Kw>SELECT</Kw> id <Kw>FROM</Kw> clients);</EI><Tips tips={[{icon:"🔍",text:"<strong style='color:#e8eaf0'>SELECT d'abord</strong> — Testez la condition avant de supprimer."},{icon:"↩️",text:"<strong style='color:#e8eaf0'>ROLLBACK</strong> — DELETE dans une transaction est annulable. TRUNCATE non."},{icon:"🔗",text:"<strong style='color:#e8eaf0'>CASCADE</strong> — ON DELETE CASCADE supprime automatiquement les enfants."},{icon:"🛡️",text:"<strong style='color:#e8eaf0'>Soft delete</strong> — Préférez deleted_at pour conserver l'historique."}]}/></div>
      <ExSection exercises={EXOS.delete} accentRgb="192,132,252"/>
    </Modal>

    <Modal open={isOpen("joins")} onClose={()=>close("joins")} color="cyan" keyword="JOINTURES" badge="Relations" tabs={["Référence","Exercices"]}>
      <div><Intro color="#00e5ff">Les jointures combinent des lignes de plusieurs tables selon une condition.</Intro><SB label="Syntaxe"><Kw>SELECT</Kw> a.col, b.col <Kw>FROM</Kw> tableA a [INNER|LEFT|RIGHT] <Kw>JOIN</Kw> tableB b <Kw>ON</Kw> a.id=b.a_id;</SB><ET>// INNER JOIN</ET><EI desc="🔗 Seulement les correspondances"><Kw>SELECT</Kw> c.nom, cmd.montant <Kw>FROM</Kw> clients c <Kw2>INNER JOIN</Kw2> commandes cmd <Kw>ON</Kw> c.id=cmd.client_id;</EI><ET>// LEFT JOIN + orphelins</ET><EI desc="📋 Tous les clients + NULL si aucune commande"><Kw>SELECT</Kw> c.nom, <Kw3>COUNT</Kw3>(cmd.id) <Kw>FROM</Kw> clients c <Kw2>LEFT JOIN</Kw2> commandes cmd <Kw>ON</Kw> c.id=cmd.client_id <Kw>GROUP BY</Kw> c.id;</EI><EI desc="🔍 Clients sans commande"><Kw>SELECT</Kw> c.id, c.nom <Kw>FROM</Kw> clients c <Kw2>LEFT JOIN</Kw2> commandes cmd <Kw>ON</Kw> c.id=cmd.client_id <Kw>WHERE</Kw> cmd.id <Kw>IS NULL</Kw>;</EI><Tips tips={[{icon:"🔢",text:"<strong style='color:#e8eaf0'>INNER vs LEFT</strong> — INNER exclut les lignes sans correspondance. LEFT les garde avec NULL."},{icon:"🔍",text:"<strong style='color:#e8eaf0'>Orphelins</strong> — LEFT JOIN … WHERE b.id IS NULL."},{icon:"🏷️",text:"<strong style='color:#e8eaf0'>Alias</strong> — Utilisez des alias courts pour éviter l'ambiguïté."},{icon:"⚡",text:"<strong style='color:#e8eaf0'>Index FK</strong> — Indexez les colonnes de jointure."}]}/></div>
      <ExSection exercises={EXOS.joins} accentRgb="0,229,255"/>
    </Modal>

    <Modal open={isOpen("agg")} onClose={()=>close("agg")} color="green" keyword="AGRÉGATION" badge="Statistiques" tabs={["Référence","Exercices"]}>
      <div><Intro color="#a8ff3e">Les fonctions d'agrégation calculent une valeur depuis un groupe de lignes, utilisées avec GROUP BY et HAVING.</Intro><SB label="Syntaxe"><Kw>SELECT</Kw> col, <Kw3>COUNT</Kw3>(*), <Kw3>SUM</Kw3>(col), <Kw3>AVG</Kw3>(col), <Kw3>MIN</Kw3>(col), <Kw3>MAX</Kw3>(col) <Kw>FROM</Kw> table <Kw>GROUP BY</Kw> col [<Kw>HAVING</Kw> cond];</SB><ET>// Exemples</ET><EI desc="📊 Stats par département"><Kw>SELECT</Kw> dept, <Kw3>COUNT</Kw3>(*) nb, <Kw3>AVG</Kw3>(sal) moy <Kw>FROM</Kw> employes <Kw>GROUP BY</Kw> dept <Kw>HAVING</Kw> <Kw3>COUNT</Kw3>(*) &gt;= <Num>5</Num>;</EI><EI desc="💰 CA mensuel"><Kw>SELECT</Kw> <Kw>DATE_FORMAT</Kw>(date_cmd,<Str>'%Y-%m'</Str>) mois, <Kw3>SUM</Kw3>(montant) ca <Kw>FROM</Kw> commandes <Kw>GROUP BY</Kw> mois;</EI><Tips tips={[{icon:"🔢",text:"<strong style='color:#e8eaf0'>COUNT(*) vs COUNT(col)</strong> — COUNT(*) compte tout. COUNT(col) ignore les NULL."},{icon:"🎯",text:"<strong style='color:#e8eaf0'>HAVING ≠ WHERE</strong> — WHERE filtre les lignes, HAVING filtre les groupes."},{icon:"⚠️",text:"<strong style='color:#e8eaf0'>GROUP BY</strong> — Toute colonne non agrégée du SELECT doit y figurer."},{icon:"📊",text:"<strong style='color:#e8eaf0'>AVG et NULL</strong> — AVG ignore automatiquement les NULL."}]}/></div>
      <ExSection exercises={EXOS.agg} accentRgb="168,255,62"/>
    </Modal>

    <Modal open={isOpen("constraints")} onClose={()=>close("constraints")} color="orange" keyword="CONTRAINTES" badge="Intégrité" tabs={["Référence","Exercices"]}>
      <div><Intro color="#ff6b35">Les contraintes garantissent l'intégrité des données, vérifiées à chaque INSERT et UPDATE.</Intro><ET>// PRIMARY KEY</ET><EI desc="🔑 PK simple"><Kw>CREATE TABLE</Kw> employes (id <Kw>INT</Kw> <Kw2>PRIMARY KEY</Kw2> AUTO_INCREMENT, nom <Kw>VARCHAR</Kw>(<Num>100</Num>));</EI><ET>// FOREIGN KEY</ET><EI desc="🔗 CASCADE"><Kw2>FOREIGN KEY</Kw2>(client_id) <Kw>REFERENCES</Kw> clients(id) <Kw>ON DELETE</Kw> CASCADE</EI><ET>// UNIQUE + NOT NULL + DEFAULT</ET><EI desc="📧 Combiné">email <Kw>VARCHAR</Kw>(<Num>150</Num>) <Kw2>UNIQUE NOT NULL</Kw2>  ·  score <Kw>INT NOT NULL DEFAULT</Kw> <Num>0</Num></EI><Tips tips={[{icon:"🔑",text:"<strong style='color:#e8eaf0'>PK vs UNIQUE</strong> — PK obligatoire et unique. UNIQUE accepte les NULL."},{icon:"🔗",text:"<strong style='color:#e8eaf0'>CASCADE</strong> — Supprime les enfants si le parent est supprimé."},{icon:"⚡",text:"<strong style='color:#e8eaf0'>Index implicite</strong> — PK et UNIQUE créent automatiquement un index."},{icon:"🛡️",text:"<strong style='color:#e8eaf0'>DEFAULT</strong> — Combine NOT NULL + DEFAULT pour une valeur par défaut sensée."}]}/></div>
      <ExSection exercises={EXOS.constraints} accentRgb="255,107,53"/>
    </Modal>

    <Modal open={isOpen("norm")} onClose={()=>close("norm")} color="yellow" keyword="NORMALISATION" badge="1NF · 2NF · 3NF" tabs={["Référence","Exercices"]}>
      <div><Intro color="#ffd166">La normalisation élimine la redondance. Chaque forme normale ajoute une contrainte sur les dépendances entre colonnes.</Intro><ET>// 1NF — Valeurs atomiques</ET><EI desc="❌ Violation"><Cm>-- commandes: id=1, produits="Laptop, Souris"  ← INTERDIT</Cm></EI><EI desc="✅ 1NF"><Kw>CREATE TABLE</Kw> lignes_cmd (commande_id <Kw>INT</Kw>, produit <Kw>VARCHAR</Kw>(<Num>100</Num>));</EI><ET>// 2NF — Pas de dépendance partielle</ET><EI desc="❌ Violation"><Cm>-- lignes_cmd(cmd_id, produit_id, qte, nom_produit) — nom_produit dépend seulement de produit_id</Cm></EI><ET>// 3NF — Pas de dépendance transitive</ET><EI desc="❌→✅"><Cm>-- employes(id, nom, dept_id, nom_dept) ← nom_dept via dept_id</Cm><br/><Kw>CREATE TABLE</Kw> departements (id, nom); <Cm>-- ✅ extrait</Cm></EI></div>
      <ExSection exercises={EXOS.norm} accentRgb="255,209,102"/>
    </Modal>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
